short_bio: >-
  <p>
    I currently work at the Broad Institute of MIT and Harvard, where I engineer and automate
    high-throughput screening platforms to accelerate drug discovery. I'm passionate about
    integrating complex experimental data with computational analysis to uncover therapeutic
    strategies for challenging diseases, with the ultimate goal of delivering new treatments to patients.
  </p>

